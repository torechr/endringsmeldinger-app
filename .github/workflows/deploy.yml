name: Deploy til GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Hent kode
        uses: actions/checkout@v4

      - name: Sett opp Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer avhengigheter
        run: npm install

      - name: Bygg appen
        run: npm run build

      - name: Sett opp GitHub Pages
        uses: actions/configure-pages@v4

      - name: Last opp artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
